name: CI

# Trigger on all pull requests into any branch, and on direct pushes to main.
# In a feature-branch workflow, pushes to main represent merges from PRs.
# Running on PRs gives fast feedback during review; running on push to main
# acts as the final gate before (or alongside) a deployment.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-progress runs for the same branch/PR when a new commit is pushed.
# This avoids wasting CI minutes on stale commits during active development.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Quality ─────────────────────────────────────────────────────────────────
  # Fast checks that give early feedback without needing a full build.
  quality:
    name: Quality (Format & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Node Version
        run: echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Run Linter
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=critical

  # ─── Build & Test ─────────────────────────────────────────────────────────────
  # Runs in parallel with quality to keep total wall-clock time low.
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Node Version
        run: echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Test Results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Project
        run: npm run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Release Metadata (main only) ────────────────────────────────────────────
  # Protected main forbids direct write-backs, so release metadata is published
  # as a GitHub release instead of a follow-up commit to the repository.
  release:
    name: Release Metadata
    needs: [quality, build_and_test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://me.alehar.workers.dev
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Node Version
        run: echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Increment Version & Generate Changelog
        run: node scripts/release.js
        id: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release.outputs.version }}
          tag_name: ${{ steps.release.outputs.version }}
          target_commitish: main
          body: ${{ steps.release.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
