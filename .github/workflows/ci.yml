name: CI

# Trigger on all pull requests into any branch, and on direct pushes to main.
# In a feature-branch workflow, pushes to main represent merges from PRs.
# Running on PRs gives fast feedback during review; running on push to main
# acts as the final gate before (or alongside) a deployment.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-progress runs for the same branch/PR when a new commit is pushed.
# This avoids wasting CI minutes on stale commits during active development.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Quality ─────────────────────────────────────────────────────────────────
  # Fast checks that give early feedback without needing a full build.
  quality:
    name: Quality (Format & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Node Version
        run: echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Run Linter
        run: npm run lint

  # ─── Build & Test ─────────────────────────────────────────────────────────────
  # Runs in parallel with quality to keep total wall-clock time low.
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Node Version
        run: echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Project
        run: npm run build

  # ─── Deploy (main only) ───────────────────────────────────────────────────────
  # Only runs after both quality and build_and_test pass, and only on pushes
  # to main (i.e. after a PR is merged). PRs get a Cloudflare preview deploy
  # automatically via the Cloudflare Pages GitHub integration; this job handles
  # the production promotion.
  deploy:
    name: Deploy to Production
    needs: [quality, build_and_test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://me.alehar.workers.dev
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Node Version
        run: echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Increment Version & Generate Changelog
        run: node scripts/release.js
        id: release

      - name: Extract Release Info
        run: |
          echo "RELEASE_VERSION=${{ steps.release.outputs.version }}" >> $GITHUB_ENV
          echo "RELEASE_CHANGELOG<<EOF" >> $GITHUB_ENV
          cat CHANGELOG.md | head -50 >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          body: ${{ env.RELEASE_CHANGELOG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Sentry Release
        run: echo "SENTRY_RELEASE=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Build Project
        run: npm run build
        env:
          SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Cloudflare
        run: npx wrangler pages deploy ./dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
